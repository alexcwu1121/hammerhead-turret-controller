repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: 'htc/hal/.*'
      - id: end-of-file-fixer
        exclude: 'htc/hal/.*'
      - id: check-yaml
        exclude: 'htc/hal/.*'
  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: clang-format
        args: ["-i"]
        exclude: 'htc/hal/.*'
      #- id: clang-tidy
      #  args: ["--quiet"]
